name = "blt-sammich"
main = "src/worker.py"
compatibility_date = "2026-03-22"
compatibility_flags = ["python_workers"]
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/slack/*", "/oauth/*", "/health"]
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

[observability]
enabled = true


[[d1_databases]]
binding = "DB"
database_name = "blt-sammich"
database_id = "replace-with-your-production-d1-database-id"
migrations_dir = "migrations"